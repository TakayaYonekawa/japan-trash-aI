version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
